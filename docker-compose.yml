services:
  # Kafka: KRaft 모드 (Zookeeper 없이) 단일 브로커.
  # 브로커(broker) 역할과 컨트롤러(controller) 역할을 한 컨테이너가 겸한다.
  # 로컬 개인 프로젝트에서는 멀티 브로커 클러스터가 오히려 과한 구성이라
  # "단일 노드 KRaft"가 실무 구조를 보여주면서도 가장 간결한 선택.
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 리스너를 3개로 나눈 이유:
      #  - PLAINTEXT(29092): 같은 도커 네트워크 안의 다른 컨테이너(kafka-ui 등)가 접근
      #  - PLAINTEXT_HOST(9092): 도커 밖 호스트 머신(추후 만들 producer.py/consumer.py)이 접근
      #  - CONTROLLER(9093): KRaft 컨트롤러 간 내부 통신 전용
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 단일 브로커라 복제 계수는 무조건 1 (복제할 다른 브로커가 없음)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Kafka UI: 토픽/메시지/컨슈머 그룹 상태를 CLI 없이 바로 확인하기 위한 용도.
  # 파이프라인 동작 자체에는 필요 없는 선택적 구성 요소.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
